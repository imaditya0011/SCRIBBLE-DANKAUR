<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="/socket.io/socket.io.js"></script>
    <title>Skribbl</title>


</head>


<body>
    <div class="overallHolder">


        <div id="player-container"></div>


        <div id="chat-container" class="chat-container"></div>
        <div class="chatInput">
            <form id="chat-form" onsubmit="updateSendChat()">
                <input id="chatField" disabled type="text" placeholder="Guess" maxlength="50" autocomplete="off">
                <button id="sendMsgBtn" disabled type="button" onclick="updateSendChat()">Send</button>
                <p id="wordcounter"></p>

            </form>
        </div>


        <div>
        </div>

        <div id="topBar">
            <p id="guessWordField">WORD: </p>
            <img id="timerIcon" width="45px" height="45px" src="/images/timer.png">
            <p id="timer"> 0 </p>
        </div>

        <canvas id="canvas" width="800" height="600"
            style="background-color: white;border:1px solid #000000; border-radius: 5px;"></canvas>

        <div id="bottomBar" class="drawing-toolbar">
            <!-- Color Palette Section -->
            <div class="toolbar-section">
                <label class="toolbar-label">Colors:</label>
                <div class="color-palette">
                    <button class="color-btn" style="background-color: #FF0000;" value="#FF0000"
                        onclick="setColor('#FF0000')" title="Red"></button>
                    <button class="color-btn" style="background-color: #4ae000;" value="#4ae000"
                        onclick="setColor('#4ae000')" title="Green"></button>
                    <button class="color-btn" style="background-color: #0041c4;" value="#0041c4"
                        onclick="setColor('#0041c4')" title="Blue"></button>
                    <button class="color-btn" style="background-color: #fbd420;" value="#fbd420"
                        onclick="setColor('#fbd420')" title="Yellow"></button>
                    <button class="color-btn" style="background-color: #fb5819;" value="#fb5819"
                        onclick="setColor('#fb5819')" title="Orange"></button>
                    <button class="color-btn" style="background-color: #bc19fb;" value="#bc19fb"
                        onclick="setColor('#bc19fb')" title="Purple"></button>
                    <button class="color-btn" style="background-color: #904e0c;" value="#904e0c"
                        onclick="setColor('#904e0c')" title="Brown"></button>
                    <button class="color-btn" style="background-color: #000000;" value="#000000"
                        onclick="setColor('#000000')" title="Black"></button>
                    <button class="color-btn" style="background-color: #ffffff; border: 1px solid #999;" value="#ffffff"
                        onclick="setColor('#ffffff')" title="White"></button>
                </div>
            </div>

            <!-- Brush Size Section -->
            <div class="toolbar-section">
                <label class="toolbar-label">Brush Size:</label>
                <div class="brush-controls">
                    <button class="control-btn decrease-btn" onclick="decreaseBoldness()" title="Decrease size">−</button>
                    <span class="size-display" id="brushSizeDisplay">1</span>
                    <button class="control-btn increase-btn" onclick="increaseBoldness()" title="Increase size">+</button>
                </div>
            </div>

            <!-- Fill & Utility Section -->
            <div class="toolbar-section">
                <button id="fillBtn" class="utility-btn fill-btn" onclick="toggleFill()" title="Toggle fill mode">Fill</button>
                <button class="utility-btn undo-btn" onclick="undoLastStroke()" title="Undo last stroke">↶</button>
                <button class="utility-btn delete-btn" onclick="clearCanvas()" title="Clear canvas">🗑️</button>
            </div>
        </div>

        <div class="voting">
            <button onclick="voteUp();document.querySelector('.voting').innerHTML='';"><img id="thumbsUp"
                    src="images/thumbsUp.gif"></button>
            <button onclick="voteDown();document.querySelector('.voting').innerHTML='';"><img id="thumbsDown"
                    src="images/thumbsDown.gif"></button>
        </div>

    </div>


    <br>

    <div id="login-container"></div>

    <script src="index.js"></script>


</body>

</html>
